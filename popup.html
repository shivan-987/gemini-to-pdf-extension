<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">

  <style>
    body {
      width: 250px;
      padding: 15px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      background-color: #f9f9f9;
    }

    h2 {
      color: #333;
      font-size: 16px;
      margin-top: 0;
    }

    button {
      padding: 10px 15px;
      background-color: #1a73e8;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      width: 100%;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #1557b0;
    }
  </style>
</head>

<body>
  <h2>AI Chat Exporter</h2>
  <p style="font-size: 12px; color: #666;">Export your Gemini chat securely.</p>

  <button id="exportBtn">Export to PDF</button>

  <script src="html2pdf.js"></script>
  <script src="popup.js"></script>
</body>

</html>
